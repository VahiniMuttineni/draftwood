version: '3.8'

services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: executiveflow
      POSTGRES_PASSWORD: ef_password
      POSTGRES_DB: executiveflow_db
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U executiveflow -d executiveflow_db"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "3202:3202"
    environment:
      - DATABASE_URL=postgres://executiveflow:ef_password@db:5432/executiveflow_db
      - BETTER_AUTH_SECRET=super_secret_better_auth_key_123
      - CORS_ORIGIN=http://localhost:3203
      - PORT=3202
    depends_on:
      db:
        condition: service_healthy

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "3203:3203"
    environment:
      - NEXT_PUBLIC_API_URL=http://localhost:3202/api/v1
    depends_on:
      - backend

volumes:
  pgdata:
