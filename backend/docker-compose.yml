version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: executiveflow
      POSTGRES_PASSWORD: ef_password
      POSTGRES_DB: executiveflow_db
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U executiveflow -d executiveflow_db"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  pgdata:
